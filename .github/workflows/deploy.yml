name: Deploy Admin SPA

on:
  push:
    branches: [main]

env:
  PROJECT_ROOT: "/home/${{ secrets.SERVER_USER }}/reshala-project"
  SERVICE_NAME: "reshala-admin-spa"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Copy files via SCP
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_TAILSCALE_IP }} "mkdir -p ${{ env.PROJECT_ROOT }}/${{ env.SERVICE_NAME }}"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r ./* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_TAILSCALE_IP }}:${{ env.PROJECT_ROOT }}/${{ env.SERVICE_NAME }}/

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_TAILSCALE_IP }} << 'EOF'
            cd ${{ env.PROJECT_ROOT }}/${{ env.SERVICE_NAME }}

            cat > .env << 'ENVEOF'
            API_BASE_URL=${{ env.API_BASE_URL }}
            MINIO_URL=${{ env.MINIO_URL }}
            RABBIT_URL=${{ env.RABBIT_URL }}
            SWAGGER_URL=${{ env.SWAGGER_URL }}
            LOGIN_URL=${{ env.LOGIN_URL }}
            DOZZLE_URL=${{ env.DOZZLE_URL }}
            ENVEOF

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Clear Docker cache and rebuild
            docker compose --env-file .env build --no-cache
            docker compose --env-file .env up -d --remove-orphans
          EOF